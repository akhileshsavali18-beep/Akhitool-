<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AkhiTool - Smart Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <!-- Sidebar: Tools List -->
    <div class="w-80 bg-white border-r shadow-sm flex flex-col h-full">
        <div class="p-5 border-b bg-blue-600 text-white flex justify-between items-center">
            <h1 class="text-xl font-bold">AkhiTool Admin</h1>
        </div>
        
        <div class="p-4 border-b">
            <button id="btn-new-tool" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2.5 rounded-lg transition-colors flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Create New Tool
            </button>
        </div>

        <div id="tools-sidebar" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="text-center text-gray-500 mt-10">Loading tools...</div>
        </div>
    </div>

    <!-- Main Content: Editor -->
    <div class="flex-1 overflow-y-auto p-8 relative">
        <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm border p-8">
            <h2 id="form-title" class="text-2xl font-bold text-gray-800 mb-6">Add New Tool</h2>
            
            <form id="tool-form" class="space-y-6">
                <!-- Hidden Field for Database Document ID -->
                <input type="hidden" id="doc-id">

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Tool Name</label>
                        <input type="text" id="tool-name" class="w-full border-gray-300 border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., WEBP to JPG" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Category</label>
                        <select id="tool-category" class="w-full border-gray-300 border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none" required>
                            <option value="Image Tools">Image Tools</option>
                            <option value="Text Tools">Text Tools</option>
                            <option value="Developer Tools">Developer Tools</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Auto-Generated Live URL</label>
                    <input type="text" id="tool-url" class="w-full bg-gray-100 border border-gray-200 rounded-lg p-3 text-gray-600 font-mono text-sm cursor-not-allowed" readonly>
                    <p class="text-xs text-gray-500 mt-1">This URL is generated automatically based on the Tool Name.</p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Short Description</label>
                    <input type="text" id="tool-desc" class="w-full border-gray-300 border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Convert WEBP images to JPG instantly" required>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Tool Content (HTML/JS Code)</label>
                    <textarea id="tool-code" class="w-full border-gray-300 border rounded-lg p-4 h-80 focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm" placeholder="Paste your code here..." required></textarea>
                </div>

                <div class="flex justify-end gap-4 pt-4 border-t">
                    <button type="button" id="btn-delete" class="hidden px-6 py-3 bg-red-100 text-red-600 font-bold rounded-xl hover:bg-red-200 transition-colors">Delete Tool</button>
                    <button type="submit" id="btn-save" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-colors shadow-md">Save Tool</button>
                </div>
            </form>
            
            <!-- Success Message -->
            <div id="success-msg" class="hidden mt-4 p-4 bg-green-100 text-green-700 rounded-lg text-center font-semibold">
                Tool saved successfully to database!
            </div>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ನಿಮ್ಮ Firebase ಕಾನ್ಫಿಗರೇಶನ್
        const firebaseConfig = {
            apiKey: "AIzaSyAqqwk3ar0ZJQO2ORON5hvlKzP7wHOFGp4",
            authDomain: "akhitool.firebaseapp.com",
            projectId: "akhitool",
            storageBucket: "akhitool.firebasestorage.app",
            messagingSenderId: "892498311198",
            appId: "1:892498311198:web:5f4824d7122ec3e8fc960f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // DOM Elements
        const form = document.getElementById('tool-form');
        const toolName = document.getElementById('tool-name');
        const toolUrl = document.getElementById('tool-url');
        const sidebar = document.getElementById('tools-sidebar');
        const btnNew = document.getElementById('btn-new-tool');
        const btnDelete = document.getElementById('btn-delete');
        
        let currentTools = [];

        // 1. Auto Generate URL Logic
        toolName.addEventListener('input', (e) => {
            if(document.getElementById('doc-id').value === "") { // Only if new tool
                const slug = e.target.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
                toolUrl.value = `https://akhileshsavali18-beep.github.io/Akhitool-/tool.html?id=${slug}`;
            }
        });

        // 2. Fetch and Display Tools in Sidebar
        async function loadTools() {
            sidebar.innerHTML = '<div class="text-center text-gray-500 mt-10">Loading tools...</div>';
            try {
                const querySnapshot = await getDocs(collection(db, "tools"));
                currentTools = [];
                querySnapshot.forEach((doc) => {
                    currentTools.push({ id: doc.id, ...doc.data() });
                });
                renderSidebar();
            } catch (error) {
                sidebar.innerHTML = '<div class="text-red-500 text-center mt-5">Error loading tools</div>';
            }
        }

        function renderSidebar() {
            sidebar.innerHTML = '';
            // Group by category
            const categories = [...new Set(currentTools.map(t => t.category))];
            
            if(categories.length === 0) {
                sidebar.innerHTML = '<div class="text-center text-gray-500 mt-10">No tools found. Create one!</div>';
                return;
            }

            categories.forEach(category => {
                let catHtml = `<div class="mb-4">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 px-2">${category}</h3>
                    <div class="space-y-1">`;
                
                const toolsInCat = currentTools.filter(t => t.category === category);
                toolsInCat.forEach(tool => {
                    catHtml += `<button onclick="window.editTool('${tool.id}')" class="w-full text-left px-3 py-2 rounded-lg text-sm font-medium text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors truncate">
                        📄 ${tool.name}
                    </button>`;
                });
                
                catHtml += `</div></div>`;
                sidebar.innerHTML += catHtml;
            });
        }

        // 3. Edit Tool Logic (Makes it global for inline onclick)
        window.editTool = (id) => {
            const tool = currentTools.find(t => t.id === id);
            if(tool) {
                document.getElementById('form-title').innerText = "Edit Tool";
                document.getElementById('doc-id').value = tool.id;
                document.getElementById('tool-name').value = tool.name;
                document.getElementById('tool-category').value = tool.category;
                document.getElementById('tool-url').value = tool.url;
                document.getElementById('tool-desc').value = tool.description || '';
                document.getElementById('tool-code').value = tool.content || '';
                btnDelete.classList.remove('hidden');
            }
        };

        // 4. Save/Update Tool Logic
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSave = document.getElementById('btn-save');
            btnSave.innerText = "Saving...";
            
            const docId = document.getElementById('doc-id').value;
            const name = toolName.value;
            const url = toolUrl.value;
            
            // Generate ID based on slug if it's a new tool
            const finalId = docId || name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

            const toolData = {
                name: name,
                category: document.getElementById('tool-category').value,
                description: document.getElementById('tool-desc').value,
                url: url,
                content: document.getElementById('tool-code').value
            };

            try {
                await setDoc(doc(db, "tools", finalId), toolData);
                
                // Show Success
                const msg = document.getElementById('success-msg');
                msg.classList.remove('hidden');
                setTimeout(() => msg.classList.add('hidden'), 3000);
                
                loadTools(); // Refresh Sidebar
            } catch (error) {
                alert("Error saving tool: " + error.message);
            }
            btnSave.innerText = "Save Tool";
        });

        // 5. Delete Logic
        btnDelete.addEventListener('click', async () => {
            if(confirm("Are you sure you want to delete this tool?")) {
                const id = document.getElementById('doc-id').value;
                await deleteDoc(doc(db, "tools", id));
                resetForm();
                loadTools();
            }
        });

        // 6. Reset Form
        btnNew.addEventListener('click', resetForm);
        function resetForm() {
            document.getElementById('form-title').innerText = "Add New Tool";
            form.reset();
            document.getElementById('doc-id').value = "";
            btnDelete.classList.add('hidden');
        }

        // Init
        loadTools();
    </script>
</body>
    </html>
