<!DOCTYPE html>
<html lang="en">
<head>

                            secondary: '#4F46E5',

</head>
<body class="bg-brand-bg font-sans text-brand-text flex h-screen overflow-hidden">

    <!-- Sidebar -->

            <img src="../logo-icon.png" alt="Icon" class="h-8 w-8 mr-3 brightness-0 invert">
            <span class="text-xl font-bold tracking-tight">AkhiAdmin</span>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 bg-brand-primary text-white rounded-xl font-medium transition-colors">
                <svg class="w-5 h-5 opacity-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Dashboard

            <a href="tools.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl font-medium transition-colors">

                Manage Tools
            </a>
            <a href="categories.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl font-medium transition-colors">
                <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Categories
            </a>
            <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl font-medium transition-colors">
                <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Settings
            </a>
        </nav>

        <div class="p-4 border-t border-gray-800 shrink-0">
            <button id="logout-btn" class="flex items-center gap-3 w-full px-4 py-3 text-red-400 hover:text-white hover:bg-red-500/10 rounded-xl font-medium transition-colors">
                <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-full lg:ml-64 w-full transition-all">
        <!-- Header -->
        <header class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-4 sm:px-6 shrink-0 z-10">
            <div class="flex items-center gap-4">
                <button id="sidebar-toggle" class="lg:hidden text-gray-500 hover:text-brand-primary p-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-xl font-bold text-gray-800 hidden sm:block">Dashboard Overview</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <a href="../index.html" target="_blank" class="text-sm font-medium text-gray-500 hover:text-brand-primary hidden sm:inline-flex items-center gap-1">
                    View Website
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                </a>
                <div class="w-9 h-9 rounded-full bg-brand-primary/10 flex items-center justify-center text-brand-primary font-bold border border-brand-primary/20">
                    A
                </div>
            </div>
        </header>

        <!-- Main Scrollable Area -->
        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 bg-brand-bg">
            
            <h1 class="text-2xl font-bold text-gray-800 mb-6 sm:hidden">Dashboard Overview</h1>

            <!-- Stats Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 sm:gap-6 mb-8">
                <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-blue-50 text-brand-primary flex items-center justify-center shrink-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-gray-500">Total Tools</p>
                        <p class="text-2xl font-bold text-gray-900" id="stat-total-tools">0</p>
                    </div>
                </div>
                
                <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center shrink-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-gray-500">Categories</p>
                        <p class="text-2xl font-bold text-gray-900" id="stat-categories">0</p>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-green-50 text-green-600 flex items-center justify-center shrink-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-gray-500">Total Visitors</p>
                        <p class="text-2xl font-bold text-gray-900">12,450</p>
                    </div>
                </div>
            </div>

            <!-- Recent Tools Table -->
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-white">
                    <h2 class="font-bold text-gray-800 text-lg">Recently Added Tools</h2>
                    <a href="tools.html" class="text-sm font-medium text-brand-primary hover:text-brand-secondary">View all</a>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50/50 text-gray-500 text-sm border-b border-gray-100">
                                <th class="px-6 py-4 font-medium">Tool Name</th>
                                <th class="px-6 py-4 font-medium hidden sm:table-cell">Category</th>
                                <th class="px-6 py-4 font-medium text-center">Status</th>
                                <th class="px-6 py-4 font-medium text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="recent-tools-tbody" class="text-sm text-gray-700 divide-y divide-gray-50">
                            <tr><td colspan="4" class="text-center py-4 text-gray-500">Loading data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Firebase Auth & Firestore Script (No more dummy data!) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAqqwk3ar0ZJQO2ORON5hvlKzP7wHOFGp4",
    authDomain: "akhitool.firebaseapp.com",
    projectId: "akhitool",
    storageBucket: "akhitool.firebasestorage.app",
    messagingSenderId: "892498311198",
    appId: "1:892498311198:web:5f4824d7122ec3e8fc960f"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 1. Mobile Menu Logic
  const sidebarToggle = document.getElementById("sidebar-toggle");
  const sidebar = document.getElementById("sidebar");
  const sidebarOverlay = document.getElementById("sidebar-overlay");

  if (sidebarToggle) {
      sidebarToggle.addEventListener("click", () => {
          sidebar.classList.remove("-translate-x-full");
          sidebarOverlay.classList.remove("hidden");
      });
  }
  if (sidebarOverlay) {
      sidebarOverlay.addEventListener("click", () => {
          sidebar.classList.add("-translate-x-full");
          sidebarOverlay.classList.add("hidden");
      });
  }

  // 2. Authentication Check & Logout
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
    }
  });

  const logoutBtn = document.getElementById("logout-btn");
  if (logoutBtn) {
    logoutBtn.addEventListener("click", () => {
      signOut(auth).then(() => {
        window.location.href = "login.html";
      }).catch((error) => {
        alert("Logout ಆಗುವಾಗ ಸಮಸ್ಯೆ ಉಂಟಾಗಿದೆ.");
      });
    });
  }

  // 3. Fetch Data for Dashboard (Live Firestore Connection)
  async function loadDashboardData() {
      try {
          const querySnapshot = await getDocs(collection(db, "tools"));
          
          let toolsList = [];
          let uniqueCategories = new Set();
          
          querySnapshot.forEach((docSnap) => {
              const toolData = docSnap.data();
              toolsList.push(toolData);
              if (toolData.category) {
                  uniqueCategories.add(toolData.category);
              }
          });

          // Update Top Cards
          document.getElementById("stat-total-tools").innerText = toolsList.length;
          document.getElementById("stat-categories").innerText = uniqueCategories.size;

          // Update Recent Tools Table (Shows top 5 recent tools based on date added)
          const tbody = document.getElementById("recent-tools-tbody");
          tbody.innerHTML = "";

          // Sort by date added (newest first)
          toolsList.sort((a, b) => {
              const dateA = a.dateAdded ? a.dateAdded.toMillis() : 0;
              const dateB = b.dateAdded ? b.dateAdded.toMillis() : 0;
              return dateB - dateA;
          });

          const recentTools = toolsList.slice(0, 5); // Take only first 5

          if (recentTools.length === 0) {
              tbody.innerHTML = '<tr><td colspan="4" class="text-center py-6 text-gray-500">No tools found. Add a new tool to see it here!</td></tr>';
          } else {
              recentTools.forEach(tool => {
                  const tr = document.createElement("tr");
                  tr.className = "border-b border-gray-50 hover:bg-gray-50/50 transition-colors";
                  tr.innerHTML = `
                      <td class="px-6 py-4 font-medium text-gray-800">${tool.name}</td>
                      <td class="px-6 py-4 hidden sm:table-cell">
                          <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-blue-50 text-brand-primary border border-blue-100">
                              ${tool.category}
                          </span>
                      </td>
                      <td class="px-6 py-4 text-center">
                          <span class="inline-flex items-center px-2 py-1 rounded-md text-xs font-medium bg-green-50 text-green-600">Active</span>
                      </td>
                      <td class="px-6 py-4 text-right">
                          <a href="tools.html" class="text-brand-primary hover:text-brand-secondary text-sm font-medium">Edit</a>
                      </td>
                  `;
                  tbody.appendChild(tr);
              });
          }

      } catch (error) {
          console.error("Error fetching dashboard data:", error);
          document.getElementById("recent-tools-tbody").innerHTML = '<tr><td colspan="4" class="text-center text-red-500 py-4">Failed to load data</td></tr>';
      }
  }

  // Load the data when page opens
  loadDashboardData();

</script>
</body>
        </html>
