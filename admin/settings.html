    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-full lg:ml-64 w-full transition-all">
        
        <!-- Header (Fixed: Profile and View Website added) -->
        <header class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-4 sm:px-6 shrink-0 z-10">
            <div class="flex items-center gap-4">
                <button id="sidebar-toggle" class="lg:hidden text-gray-500 hover:text-brand-primary p-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>

            <div class="flex items-center gap-4">

        <!-- Main Scrollable Area (Fixed: pb-32 added for mobile scroll) -->
        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 pb-32 bg-brand-bg">

            <div class="max-w-3xl space-y-6">

                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                    <h2 class="text-lg font-bold text-gray-800 mb-4">Website Profile</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Website Name</label>
                            <input type="text" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brand-primary/20 focus:border-brand-primary text-sm" value="AkhiTool">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Tagline / Subtitle</label>
                            <input type="text" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brand-primary/20 focus:border-brand-primary text-sm" value="Your Everyday Online Toolbox">
                        </div>
                    </div>
                </div>

                <!-- Logo Settings -->
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                    <h2 class="text-lg font-bold text-gray-800 mb-4">Logo Settings</h2><div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Main Logo (PNG/SVG)</label>
                            <input type="file" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-brand-primary hover:file:bg-blue-100 cursor-pointer">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Favicon / Icon Only (PNG/SVG)</label>
                            <input type="file" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-brand-primary hover:file:bg-blue-100 cursor-pointer">
                        </div>
                    </div>
                </div>

                <!-- SEO & Analytics -->
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                    <h2 class="text-lg font-bold text-gray-800 mb-4">SEO & Analytics Setup</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Global Meta Description</label>
                            <textarea rows="3" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brand-primary/20 focus:border-brand-primary text-sm resize-none">Free tools for PDF, images, calculators, AI, text, SEO and more.</textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Google Analytics ID</label>

                        </div>

                </div>

                <div class="flex justify-end">

                        Save All Settings

                </div>

<!-- Firebase Auth & Mobile Menu Script -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAqqwk3ar0ZJQO2ORON5hvlKzP7wHOFGp4",
    authDomain: "akhitool.firebaseapp.com",
    projectId: "akhitool",
    storageBucket: "akhitool.firebasestorage.app",
    messagingSenderId: "892498311198",
    appId: "1:892498311198:web:5f4824d7122ec3e8fc960f"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 1. Mobile Menu Logic
  const sidebarToggle = document.getElementById("sidebar-toggle");
  const sidebar = document.getElementById("sidebar");
  const sidebarOverlay = document.getElementById("sidebar-overlay");

  if (sidebarToggle) {
      sidebarToggle.addEventListener("click", () => {
          sidebar.classList.remove("-translate-x-full");
          sidebarOverlay.classList.remove("hidden");
      });
  }
  if (sidebarOverlay) {
      sidebarOverlay.addEventListener("click", () => {
          sidebar.classList.add("-translate-x-full");
          sidebarOverlay.classList.add("hidden");
      });
  }

  // 2. Authentication Check & Logout
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
    }
  });

  const logoutBtn = document.getElementById("logout-btn");
  if (logoutBtn) {
    logoutBtn.addEventListener("click", () => {
      signOut(auth).then(() => {
        window.location.href = "login.html";
      }).catch((error) => {
        alert("Logout Error");
      });
    });
  }
</script>
</body>
