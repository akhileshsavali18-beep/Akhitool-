<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AkhiTool</title>
    
    <link rel="icon" href="../logo-icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#2563EB',
                            secondary: '#4F46E5',
                            bg: '#F8FAFC',
                            card: '#FFFFFF',
                            text: '#111827'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg font-sans text-brand-text h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-brand-card rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 p-8 sm:p-10">
        
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <img src="../logo.png" alt="AkhiTool Logo" class="h-12 w-auto">
        </div>

        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Welcome Back</h1>
            <p class="text-sm text-gray-500 mt-2">Sign in to access the AkhiTool admin panel.</p>
        </div>

        <form id="admin-login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5" for="email">Email Address</label>
                <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand-primary/20 focus:border-brand-primary transition-all text-sm" placeholder="admin@akhitool.com" required>
            </div>
            
            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <label class="block text-sm font-medium text-gray-700" for="password">Password</label>
                </div>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand-primary/20 focus:border-brand-primary transition-all text-sm" placeholder="••••••••" required>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 text-brand-primary rounded border-gray-300 focus:ring-brand-primary">
                    <span class="text-sm text-gray-600">Remember me</span>
                </label>
            </div>

            <button type="submit" id="login-btn" class="w-full bg-brand-primary hover:bg-brand-secondary text-white font-medium py-3 rounded-xl transition-colors shadow-sm mt-4">
    Sign In to Dashboard
            </button>
            
        </form>
    </div>

    <!-- Firebase Authentication Script with Local Persistence -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAqqwk3ar0ZJQO2ORON5hvlKzP7wHOFGp4",
    authDomain: "akhitool.firebaseapp.com",
    projectId: "akhitool",
    storageBucket: "akhitool.firebasestorage.app",
    messagingSenderId: "892498311198",
    appId: "1:892498311198:web:5f4824d7122ec3e8fc960f"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const loginBtn = document.getElementById("login-btn");
  
  if (loginBtn) {
      loginBtn.addEventListener("click", (e) => {
          e.preventDefault(); 
          
          const emailInput = document.getElementById("email").value;
          const passwordInput = document.getElementById("password").value;
          
          if (emailInput === "" || passwordInput === "") {
              alert("ದಯವಿಟ್ಟು Email ಮತ್ತು Password ಹಾಕಿ!");
              return;
          }

          loginBtn.innerText = "Logging in...";

          // ಲಾಗಿನ್ ಡೇಟಾವನ್ನು ಬ್ರೌಸರ್‌ನಲ್ಲಿ ಸೇವ್ ಮಾಡಲು ಕಮಾಂಡ್
          setPersistence(auth, browserLocalPersistence)
            .then(() => {
              return signInWithEmailAndPassword(auth, emailInput, passwordInput);
            })
            .then((userCredential) => {
              alert("ಲಾಗಿನ್ ಯಶಸ್ವಿಯಾಗಿದೆ!");
              window.location.href = "dashboard.html"; 
            })
            .catch((error) => {
              alert("ತಪ್ಪು Email ಅಥವಾ Password. ದಯವಿಟ್ಟು ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ.");
              console.error(error.message);
              loginBtn.innerText = "Login"; 
            });
      });
  }
                                </script>
    
    
</body>
</html>
