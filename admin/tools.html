          
    
  
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Tools - AkhiTool Admin</title>
    
    <link rel="icon" href="../logo-icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#2563EB',
                            secondary: '#4F46E5',
                            bg: '#F8FAFC',
                            card: '#FFFFFF',
                            text: '#111827',
                            sidebar: '#0F172A'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg font-sans text-brand-text flex h-screen overflow-hidden">

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-gray-900/50 z-20 hidden lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-64 bg-brand-sidebar text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col h-full">
        <div class="h-16 flex items-center px-6 border-b border-gray-800 shrink-0">
            <img src="../logo-icon.png" alt="Icon" class="h-8 w-8 mr-3 brightness-0 invert">
            <span class="text-xl font-bold tracking-tight">AkhiAdmin</span>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl font-medium transition-colors">
                <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Dashboard
            </a>
            <a href="tools.html" class="flex items-center gap-3 px-4 py-3 bg-brand-primary text-white rounded-xl font-medium transition-colors">
                <svg class="w-5 h-5 opacity-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                Manage Tools
            </a>
            <a href="categories.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl font-medium transition-colors">
                <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Categories
            </a>
            <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl font-medium transition-colors">
                <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Settings
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-full lg:ml-64 w-full transition-all">
        
        <!-- Header Fixed with Mobile Menu and Profile -->
        <header class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-4 sm:px-6 shrink-0 z-10">
            <div class="flex items-center gap-4">
                <button id="sidebar-toggle" class="lg:hidden text-gray-500 hover:text-brand-primary p-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-xl font-bold text-gray-800 hidden sm:block">Manage Tools</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <a href="../index.html" target="_blank" class="text-sm font-medium text-gray-500 hover:text-brand-primary hidden sm:inline-flex items-center gap-1">
                    View Website
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                </a>
                <div class="w-9 h-9 rounded-full bg-brand-primary/10 flex items-center justify-center text-brand-primary font-bold border border-brand-primary/20">
                    A
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 bg-brand-bg">
            <div class="flex flex-col sm:flex-row justify-between gap-4 mb-6">
                <div class="relative w-full sm:w-96">
                    <input type="text" class="block w-full pl-4 pr-3 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-primary/20 focus:border-brand-primary text-sm" placeholder="Search tools...">
                </div>
                
                <button id="add-tool-btn" class="bg-brand-primary hover:bg-brand-secondary text-white px-5 py-2.5 rounded-xl text-sm font-medium transition-colors shadow-sm flex items-center justify-center gap-2 shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    Add New Tool
                </button>
            </div>

            <!-- Tools Table -->
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[600px]">
                        <thead>
                            <tr class="bg-gray-50/50 text-gray-500 text-sm border-b border-gray-100">
                                <th class="px-6 py-4 font-medium">Tool Info</th>
                                <th class="px-6 py-4 font-medium">Category</th>
                                <th class="px-6 py-4 font-medium">URL Slug</th>
                                <th class="px-6 py-4 font-medium text-center">Status</th>
                                <th class="px-6 py-4 font-medium text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="all-tools-tbody" class="text-sm text-gray-700 divide-y divide-gray-50">
                            <!-- Data injected here by Firebase -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Add/Edit Tool -->
    <div id="tool-modal" class="fixed inset-0 bg-gray-900/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-xl">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-bold text-gray-800">Add New Tool</h3>
                <button id="close-modal-btn" class="text-gray-400 hover:text-red-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="add-tool-form" class="p-6 space-y-4">
                      <div><label class="block text-sm font-medium text-gray-700 mb-1">Tool Content (HTML/JS Code)</label>
    <textarea id="tool-content" rows="6" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-brand-primary/20 focus:border-brand-primary" placeholder="Peste your tool code here..."></textarea>
                      </div>
                      
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tool Name</label>
                    <input type="text" id="tool-name" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-brand-primary/20 focus:border-brand-primary" placeholder="e.g. Image Compressor" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <input type="text" id="tool-desc" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-brand-primary/20 focus:border-brand-primary" placeholder="What does this tool do?" required>
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                        <input type="text" id="tool-category" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-brand-primary/20 focus:border-brand-primary" placeholder="e.g. Image Tools" required>
                    </div>
                    <div class="w-1/2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">URL (Link)</label>
                        <input type="text" id="tool-url" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-brand-primary/20 focus:border-brand-primary" placeholder="e.g. image-compressor.html" required>
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-100">
                    <button type="button" id="cancel-modal-btn" class="px-4 py-2 text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200">Cancel</button>
                    <button type="submit" id="save-tool-btn" class="px-4 py-2 bg-brand-primary text-white rounded-xl hover:bg-brand-secondary">Save Tool</button>
                </div>
            </form>
        </div>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyAqqwk3ar0ZJQO2ORON5hvlKzP7wHOFGp4",
      authDomain: "akhitool.firebaseapp.com",
      projectId: "akhitool",
      storageBucket: "akhitool.firebasestorage.app",
      messagingSenderId: "892498311198",
      appId: "1:892498311198:web:5f4824d7122ec3e8fc960f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Mobile Menu Logic
  const sidebarToggle = document.getElementById("sidebar-toggle");
  const sidebar = document.getElementById("sidebar");
  const sidebarOverlay = document.getElementById("sidebar-overlay");

  if (sidebarToggle) {
      sidebarToggle.addEventListener("click", () => {
          sidebar.classList.remove("-translate-x-full");
          sidebarOverlay.classList.remove("hidden");
      });
  }
  if (sidebarOverlay) {
      sidebarOverlay.addEventListener("click", () => {
          sidebar.classList.add("-translate-x-full");
          sidebarOverlay.classList.add("hidden");
      });
  }

  // Modal Logic
  const modal = document.getElementById("tool-modal");
  const addBtn = document.getElementById("add-tool-btn");
  const closeBtn = document.getElementById("close-modal-btn");
  const cancelBtn = document.getElementById("cancel-modal-btn");
  const form = document.getElementById("add-tool-form");
  const modalTitle = document.querySelector("#tool-modal h3");
  const saveBtn = document.getElementById("save-tool-btn");

  let currentEditId = null; 
  let toolsDataList = {}; 

  if(addBtn) {
      addBtn.addEventListener("click", () => {
          currentEditId = null;
          form.reset();
          modalTitle.innerText = "Add New Tool";
          saveBtn.innerText = "Save Tool";
          modal.classList.remove("hidden");
      });
  }
  
  const closeModal = () => {
      modal.classList.add("hidden");
      if(form) form.reset(); 
      currentEditId = null;
  };
  if(closeBtn) closeBtn.addEventListener("click", closeModal);
  if(cancelBtn) cancelBtn.addEventListener("click", closeModal);

  async function loadTools() {
      const tbody = document.getElementById("all-tools-tbody");
      if(!tbody) return;
      
      tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-500">Loading live tools...</td></tr>';
      toolsDataList = {}; 

      try {
          const querySnapshot = await getDocs(collection(db, "tools"));
          tbody.innerHTML = ""; 

          if (querySnapshot.empty) {
              tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-500">No tools found. Add a new tool!</td></tr>';
              return;
          }

          querySnapshot.forEach((docSnap) => {
              const tool = docSnap.data();
              const id = docSnap.id;
              toolsDataList[id] = tool; 

              const tr = document.createElement("tr");
              tr.className = "border-b border-gray-50 hover:bg-gray-50/50 transition-colors";
              
              tr.innerHTML = `
                  <td class="px-6 py-4">
                      <div class="font-medium text-gray-800">${tool.name}</div>
                      <div class="text-xs text-gray-500 mt-1">${tool.description}</div>
                  </td>
                  <td class="px-6 py-4">
                      <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-blue-50 text-brand-primary border border-blue-100">
                          ${tool.category}
                      </span>
                  </td>
                  <td class="px-6 py-4 text-gray-500 text-sm">${tool.url}</td>
                  <td class="px-6 py-4 text-center">
                      <span class="inline-flex items-center px-2 py-1 rounded-md text-xs font-medium bg-green-50 text-green-600">Active</span>
                  </td>
                  <td class="px-6 py-4 text-right">
                      <button class="edit-btn text-blue-500 hover:text-blue-700 transition-colors p-1 mr-2" data-id="${id}" title="Edit">
                          <svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                      </button>
                      <button class="delete-btn text-red-400 hover:text-red-600 transition-colors p-1" data-id="${id}" title="Delete">
                          <svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                      </button>
                  </td>
              `;
              tbody.appendChild(tr);
          });
      } catch (error) {
          console.error("Error loading tools:", error);
          tbody.innerHTML = '<tr><td colspan="5" class="text-center text-red-500 py-8">Error loading data</td></tr>';
      }
  }

  loadTools();

  document.getElementById("all-tools-tbody").addEventListener("click", async (e) => {
      const editBtn = e.target.closest('.edit-btn');
      const deleteBtn = e.target.closest('.delete-btn');

      if (deleteBtn) {
          const id = deleteBtn.getAttribute('data-id');
          if (confirm("Are you sure you want to delete this tool?")) {
              try {
                  await deleteDoc(doc(db, "tools", id));
                  alert("Tool Deleted!");
                  loadTools(); 
              } catch (error) {
                  alert("Error deleting tool: " + error.message);
              }
          }
      }

      if (editBtn) {
          const id = editBtn.getAttribute('data-id');
          const tool = toolsDataList[id];
          
          currentEditId = id; 
          
          document.getElementById("tool-name").value = tool.name;
          document.getElementById("tool-desc").value = tool.description;
          document.getElementById("tool-category").value = tool.category;
          document.getElementById("tool-url").value = tool.url;
          
          // ಎಡಿಟ್ ಮಾಡುವಾಗ ಕೋಡ್ ಅನ್ನು ಸಹ ಡೇಟಾಬೇಸ್‌ನಿಂದ ಫಾರ್ಮ್‌ಗೆ ತರಲು
          const codeInput = document.getElementById("tool-code");
          if(codeInput) {
              codeInput.value = tool.content || "";
          }
          
          modalTitle.innerText = "Edit Tool";
          saveBtn.innerText = "Update Tool";
          modal.classList.remove("hidden");
      }
  });

  if(form) {
      form.addEventListener("submit", async (e) => {
          e.preventDefault();
          
          const toolData = {
              name: document.getElementById("tool-name").value,
              description: document.getElementById("tool-desc").value,
              category: document.getElementById("tool-category").value,
              url: document.getElementById("tool-url").value
          };

          // ಸೇವ್ ಮಾಡುವಾಗ ಕೋಡ್ ಅನ್ನು ಸಹ ಡೇಟಾಬೇಸ್‌ಗೆ ಸೇವ್ ಮಾಡಲು!
          const codeInput = document.getElementById("tool-code");
          if(codeInput) {
              toolData.content = codeInput.value;
          }

          try {
              if (currentEditId) {
                  saveBtn.innerText = "Updating...";
                  await updateDoc(doc(db, "tools", currentEditId), toolData);
                  alert("Tool Successfully Updated! ✏️");
              } else {
                  saveBtn.innerText = "Saving...";
                  toolData.dateAdded = new Date();
                  await addDoc(collection(db, "tools"), toolData);
                  alert("Tool Successfully Added! 🚀");
              }
              
              closeModal();
              loadTools(); 
              
          } catch (error) {
              console.error("Error saving document: ", error);
              alert("Something went wrong! Error: " + error.message);
              saveBtn.innerText = currentEditId ? "Update Tool" : "Save Tool";
          }
      });
  }
</script>
          
</body>
</html>                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </html>
