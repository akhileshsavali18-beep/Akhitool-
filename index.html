<!DOCTYPE html>
<html lang="en" class="scroll-smooth overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>AkhiTool - Your Everyday Online Toolbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { primary: '#2563EB', bg: '#F8FAFC', text: '#111827' } } } } }
    </script>
</head>
<body class="bg-brand-bg text-brand-text font-sans flex flex-col min-h-screen">

<!-- Navbar -->
<header class="fixed top-0 w-full bg-white z-40 h-16 flex items-center px-4 justify-between border-b">
    <a href="/"><img src="logo.png" alt="Logo" class="h-10 w-auto"></a>
    <button id="mobile-menu-btn" class="p-2 border rounded-lg">☰</button>
</header>

<!-- Mobile Menu -->
<div id="mobile-drawer" class="fixed inset-y-0 right-0 z-50 w-72 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 overflow-y-auto">
    <div class="p-4 border-b flex justify-between"><span class="font-bold">Menu</span><button id="mobile-close-btn" class="p-2">✕</button></div>
    <div id="mobile-menu-container" class="p-4"></div>
</div>

<!-- Main Content -->
<main class="flex-grow pt-16">
    <!-- Hero Section -->
    <section class="py-12 text-center border-b">
        <h1 class="text-4xl sm:text-6xl font-extrabold mb-6">Every Tool You Need, In One Place.</h1>
        <p class="text-gray-500 max-w-2xl mx-auto">Fast, secure and free online tools designed to boost your productivity.</p>
    </section>

    <!-- Popular Tools -->
    <section class="max-w-7xl mx-auto px-4 py-12">
        <h2 class="text-3xl font-bold mb-8">Popular Tools</h2>
        <div id="popular-tools-container" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
    </section>

    <!-- Stats & FAQ (ನಿಮ್ಮ ಹಳೆಯ ಫೀಚರ್ಸ್) -->
    <section class="bg-white py-12 border-y text-center">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
            <div><div class="text-4xl font-extrabold text-blue-600">10+</div><div class="text-sm uppercase text-gray-500">Free Tools</div></div>
            <div><div class="text-4xl font-extrabold text-blue-600">100%</div><div class="text-sm uppercase text-gray-500">Free</div></div>
        </div>
    </section>

    <section class="max-w-3xl mx-auto py-12 px-4">
        <h2 class="text-3xl font-bold mb-8 text-center">Frequently Asked Questions</h2>
        <div class="space-y-4">
            <div class="bg-white p-6 rounded-2xl border"><h3 class="font-bold mb-2">What is AkhiTool?</h3><p class="text-gray-600 text-sm">Your everyday online toolbox.</p></div>
        </div>
    </section>
</main>

<!-- Footer -->
<footer class="bg-white border-t pt-12 pb-8 text-center text-sm text-gray-500">
    <p>© 2026 AkhiTool. All Rights Reserved.</p>
</footer>

<!-- Firebase & Main Logic -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app = initializeApp({
        apiKey: "AIzaSyAqqwk3ar0ZJQO2ORON5hvlKzP7wHOFGp4",
        projectId: "akhitool"
    });
    const db = getFirestore(app);

    async function init() {
        const snap = await getDocs(collection(db, "tools"));
        let menuData = {};
        snap.forEach(d => {
            const t = d.data();
            const cat = t.category || "General";
            if(!menuData[cat]) menuData[cat] = [];
            menuData[cat].push(t);
        });

        // Tools
        document.getElementById("popular-tools-container").innerHTML = snap.docs.map(d => {
            const t = d.data();
            return `<div class="bg-white p-6 border rounded-2xl shadow-sm"><h3 class="font-bold">${t.name}</h3><a href="${t.url}" class="text-blue-600 font-bold">Use Now →</a></div>`;
        }).join('');

        // Mobile Menu
        document.getElementById("mobile-menu-container").innerHTML = Object.keys(menuData).map(cat => `
            <div class="border-b"><button class="w-full text-left py-4 font-bold toggle">${cat} ▼</button>
            <div class="hidden pl-4 pb-2">${menuData[cat].map(t => `<a href="${t.url}" class="block py-1 text-sm">${t.name}</a>`).join('')}</div></div>
        `).join('');

        document.querySelectorAll('.toggle').forEach(btn => btn.onclick = () => btn.nextElementSibling.classList.toggle('hidden'));
    }

    document.getElementById('mobile-menu-btn').onclick = () => document.getElementById('mobile-drawer').classList.remove('translate-x-full');
    document.getElementById('mobile-close-btn').onclick = () => document.getElementById('mobile-drawer').classList.add('translate-x-full');
    init();
</script>
</body>
</html>
