<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AkhiTool - Your Everyday Online Toolbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { primary: '#2563EB' } } } } }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Navbar -->
    <header class="fixed top-0 w-full bg-white border-b z-40 h-16 flex items-center px-4 justify-between">
        <a href="/" class="flex items-center"><img src="logo.png" alt="Logo" class="h-10 w-auto"></a>
        <button id="mobile-menu-btn" class="p-2 border rounded-lg">☰</button>
    </header>

    <!-- Mobile Drawer -->
    <div id="mobile-menu-overlay" class="fixed inset-0 bg-black/50 z-50 hidden"></div>
    <div id="mobile-drawer" class="fixed inset-y-0 right-0 z-50 w-72 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 overflow-y-auto">
        <div class="flex items-center justify-between p-4 border-b">
            <span class="font-bold">Menu</span>
            <button id="mobile-close-btn" class="p-2">✕</button>
        </div>
        <div id="mobile-menu-container" class="px-2 py-4"></div>
    </div>

    <!-- Main Content -->
    <main class="pt-24 pb-16 px-4 max-w-7xl mx-auto">
        <section id="popular" class="mb-12">
            <h2 class="text-3xl font-bold mb-8">Popular Tools</h2>
            <div id="popular-tools-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>

        <!-- Stats Section (ನಿಮ್ಮ ಹಳೆಯ ಕೋಡ್‌ನಲ್ಲಿದ್ದದ್ದು) -->
        <section class="bg-white border-y py-12 mb-16">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
                <div><div class="text-4xl font-extrabold text-blue-600">10+</div><div class="text-sm uppercase text-gray-500">Tools</div></div>
                <div><div class="text-4xl font-extrabold text-blue-600">100%</div><div class="text-sm uppercase text-gray-500">Free</div></div>
            </div>
        </section>

        <!-- FAQ Section -->
        <section id="faq" class="max-w-3xl mx-auto mb-16">
            <h2 class="text-3xl font-bold mb-8 text-center">Frequently Asked Questions</h2>
            <div class="space-y-4">
                <div class="bg-white p-6 rounded-2xl border"><h3 class="font-bold mb-2">What is AkhiTool?</h3><p class="text-gray-600 text-sm">AkhiTool is your everyday online toolbox.</p></div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t pt-16 pb-8 text-center">
        <p>© 2026 AkhiTool. All Rights Reserved.</p>
    </footer>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqqwk3ar0ZJQO2ORON5hvlKzP7wHOFGp4",
            authDomain: "akhitool.firebaseapp.com",
            projectId: "akhitool",
            storageBucket: "akhitool.firebasestorage.app",
            messagingSenderId: "892498311198",
            appId: "1:892498311198:web:5f4824d7122ec3e8fc960f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function init() {
            const snap = await getDocs(collection(db, "tools"));
            let tools = [], menuData = {};

            snap.forEach((doc) => {
                const tool = { id: doc.id, ...doc.data() };
                tools.push(tool);
                const cat = tool.category || "General";
                if(!menuData[cat]) menuData[cat] = [];
                menuData[cat].push(tool);
            });

            // Popular Tools
            const popCont = document.getElementById("popular-tools-container");
            if(popCont) popCont.innerHTML = tools.map(t => `
                <div class="bg-white p-6 border rounded-2xl shadow-sm">
                    <h3 class="font-bold text-lg">${t.name}</h3>
                    <p class="text-sm text-gray-500 mb-4">${t.description || ''}</p>
                    <a href="${t.url}" class="text-blue-600 font-bold">Use Tool →</a>
                </div>
            `).join('');

            // Mobile Menu
            const menuCont = document.getElementById("mobile-menu-container");
            menuCont.innerHTML = '<a href="/" class="block px-4 py-3 font-bold border-b">Home</a>';
            Object.keys(menuData).forEach(cat => {
                const div = document.createElement("div");
                div.className = "border-b";
                div.innerHTML = `
                    <button class="menu-btn w-full flex justify-between py-4 px-4 font-medium text-gray-700">${cat} <span>▼</span></button>
                    <div class="hidden bg-gray-50 px-6 py-2 space-y-2">
                        ${menuData[cat].map(t => `<a href="${t.url}" class="block py-1 text-sm text-gray-600">${t.name}</a>`).join('')}
                    </div>
                `;
                div.querySelector('.menu-btn').onclick = (e) => e.target.closest('div').querySelector('.hidden').classList.toggle('hidden');
                menuCont.appendChild(div);
            });
        }

        document.getElementById('mobile-menu-btn').onclick = () => {
            document.getElementById('mobile-drawer').classList.remove('translate-x-full');
            document.getElementById('mobile-menu-overlay').classList.remove('hidden');
        };
        document.getElementById('mobile-close-btn').onclick = () => {
            document.getElementById('mobile-drawer').classList.add('translate-x-full');
            document.getElementById('mobile-menu-overlay').classList.add('hidden');
        };

        init();
    </script>
</body>
</html>
